<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messages</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 0;
            color: black;
        }

        .container {
            width: 100%;
            max-width: 650px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 3px solid #ff7ebf;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .messages-box {
            height: 300px;
            overflow-y: auto;
            border: 2px solid #ddd;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f7f7f7;
            box-sizing: border-box;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            width: 100%;
        }

        .input-row input {
            flex: 1;
            padding: 14px;
            border: 2px solid black;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .input-row button {
            padding: 14px 18px;
            border-radius: 10px;
            border: 2px solid black;
            background: #ff7ebf;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            color: black;
            white-space: nowrap;
        }

        .msg {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 14px;
            font-weight: 600;
            line-height: 1.4;
            font-size: 13px;
            box-sizing: border-box;
        }

        .msg-left {
            background: #e5e5ea;
            color: black;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-right {
            background: #ff7ebf;
            color: black;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-user {
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 2px;
            opacity: 0.7;
        }

        .msg-content {
            font-size: 13px;
        }
    </style>
    <link rel="stylesheet" href="/responsive.css">

</head>
<body>

<div id="navbar" style="display:none;"></div>

<script>
async function updateCartCount() {
    const el = document.getElementById("cartCount");
    if (!el) return;

    const res = await fetch("/api/cart", { credentials: "include" });
    if (!res.ok) {
        el.textContent = 0;
        return;
    }

    const cart = await res.json();
    el.textContent = cart.length;
}
</script>

<script>
fetch("/navbar.html")
    .then(res => res.text())
    .then(html => {
        const nav = document.getElementById("navbar");
        nav.innerHTML = html;
        nav.style.display = "block";

        const h = document.getElementById("hamburger");
        if (h) {
            h.addEventListener("click", () => {
                const m = document.getElementById("mobileMenu");
                m.classList.toggle("open");
            });
        }

        updateCartCount && updateCartCount();
    });
</script>

<div class="container">
    <h2>Chat</h2>

    <div id="messages" class="messages-box"></div>

    <div class="input-row">
        <input id="msgInput" type="text">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
let sellerId = new URLSearchParams(window.location.search).get("seller");
let listingId = new URLSearchParams(window.location.search).get("listing");

async function loadMessages() {
    const res = await fetch(`/api/messages/conversation?seller=${sellerId}&listing=${listingId}`, { credentials: "include" });
    if (!res.ok) return;

    const data = await res.json();
    const box = document.getElementById("messages");
    box.innerHTML = "";

    data.forEach(m => {
        const wrap = document.createElement("div");
        wrap.className = "msg " + (m.mine ? "msg-right" : "msg-left");

        const userDiv = document.createElement("div");
        userDiv.className = "msg-user";
        userDiv.textContent = m.senderUsername;

        const contentDiv = document.createElement("div");
        contentDiv.className = "msg-content";
        contentDiv.textContent = m.content;

        wrap.appendChild(userDiv);
        wrap.appendChild(contentDiv);
        box.appendChild(wrap);
    });

    box.scrollTop = box.scrollHeight;
}

async function sendMessage() {
    const content = document.getElementById("msgInput").value;
    if (!content.trim()) return;

    await fetch("/api/messages/send", {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            receiverId: Number(sellerId),
            listingId: Number(listingId),
            content
        })
    });

    document.getElementById("msgInput").value = "";
    loadMessages();
}

document.getElementById("msgInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
    }
});

loadMessages();
setInterval(loadMessages, 2000);
</script>

</body>
</html>
