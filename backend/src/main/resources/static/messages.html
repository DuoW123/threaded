<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #fafafa; margin: 0; padding: 0; }
        .container { max-width: 900px; margin: 30px auto; background: white; padding: 20px; border-radius: 12px; border: 3px solid #ff7ebf; display: flex; flex-direction: column; height: calc(100vh - 80px); box-sizing: border-box; }
        .messages-box { flex: 1; overflow-y: auto; border: 2px solid black; padding: 10px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; }
        .input-row { display: flex; margin-top: 15px; gap: 10px; }
        .input-row input { flex: 1; padding: 10px; border: 2px solid black; border-radius: 8px; }
        .input-row button { padding: 10px 16px; border-radius: 8px; border: 2px solid black; background: #ff7ebf; font-weight: 600; cursor: pointer; }
        .msg { max-width: 70%; padding: 10px 14px; border-radius: 14px; font-weight: 600; }
        .msg-left { background: #e0e0e0; color: black; align-self: flex-start; }
        .msg-right { background: #ff7ebf; color: black; align-self: flex-end; }
        .msg-user { font-size: 11px; font-weight: 600; margin-bottom: 2px; opacity: 0.8; }
        .msg-content { font-size: 14px; }
    </style>
</head>
<body>

<div id="navbar"></div>
<script>
fetch("/navbar.html").then(r=>r.text()).then(h=>document.getElementById("navbar").innerHTML=h);
</script>

<div class="container">
    <h2>Chat</h2>
    <div id="messages" class="messages-box"></div>

    <div class="input-row">
        <input id="msgInput" type="text">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
let sellerId = new URLSearchParams(window.location.search).get("seller");
let listingId = new URLSearchParams(window.location.search).get("listing");

async function loadMessages() {
    const res = await fetch(`/api/messages/conversation?seller=${sellerId}&listing=${listingId}`, { credentials: "include" });
    if (!res.ok) return;
    const data = await res.json();
    const box = document.getElementById("messages");
    box.innerHTML = "";
    data.forEach(m => {
        const wrap = document.createElement("div");
        wrap.className = "msg " + (m.mine ? "msg-right" : "msg-left");

        const userDiv = document.createElement("div");
        userDiv.className = "msg-user";
        userDiv.textContent = m.senderUsername;

        const contentDiv = document.createElement("div");
        contentDiv.className = "msg-content";
        contentDiv.textContent = m.content;

        wrap.appendChild(userDiv);
        wrap.appendChild(contentDiv);
        box.appendChild(wrap);
    });
    box.scrollTop = box.scrollHeight;
}

async function sendMessage() {
    const content = document.getElementById("msgInput").value;
    if (!content.trim()) return;

    await fetch("/api/messages/send", {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            receiverId: Number(sellerId),
            listingId: Number(listingId),
            content
        })
    });

    document.getElementById("msgInput").value = "";
    loadMessages();
}

document.getElementById("msgInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
    }
});

loadMessages();
setInterval(loadMessages, 2000);
</script>

</body>
</html>
