<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Listing</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 0;
            color: black;
        }

        .container {
            max-width: 650px;
            margin: 50px auto;
            background: white;
            padding: 35px;
            border-radius: 12px;
            border: 3px solid #ff7ebf;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 2px solid black;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 12px;
            font-size: 18px;
            font-weight: 600;
            border: 2px solid black;
        }

        #save-btn {
            background: #ff7ebf;
            color: black;
        }

        #save-btn:hover {
            background: #ff9ad0;
        }

        #cancel-btn {
            background: black;
            color: white;
        }

        #cancel-btn:hover {
            background: #333;
        }

        #dropZone {
            border: 3px dashed #ff7ebf;
            background: #ffe6f4;
            padding: 30px;
            text-align: center;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.2s;
        }

        #dropZone.dragover {
            background: #ffbfe5;
        }

        .image-preview {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .image-wrapper {
            position: relative;
            display: inline-block;
            border-radius: 8px;
            transition: 0.2s;
            padding: 4px;
            background: white;
        }

        .image-wrapper.selected {
            outline: 4px solid red;
            outline-offset: 0;
        }

        .image-wrapper img {
            height: 120px;
            width: 120px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid black;
            margin: 4px;
        }

        .trash-icon {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff4d4d;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid black;
        }

        .trash-icon:hover {
            background: #ff1a1a;
        }

        .delete-checkbox {
            display: none;
        }

        .message {
            margin-top: 15px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<div id="navbar"></div>

<script>
async function updateCartCount() {
    const el = document.getElementById("cartCount");
    if (!el) return;

    const res = await fetch("http://localhost:8080/api/cart", { credentials: "include" });
    if (!res.ok) {
        el.textContent = 0;
        return;
    }

    const cart = await res.json();
    el.textContent = cart.length;
}
</script>

<script>
    fetch("/navbar.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("navbar").innerHTML = html;
            updateCartCount();
        });
</script>

<div class="container">
    <h2>Edit Listing</h2>

    <input id="title" type="text" placeholder="Title">
    <textarea id="description" placeholder="Description"></textarea>
    <input id="price" type="number" placeholder="Price (£)" step="0.01">

    <input id="brand" type="text" placeholder="Brand">
    <input id="size" type="text" placeholder="Size">

    <select id="condition">
        <option value="">Select Condition</option>
        <option value="NEW">New</option>
        <option value="USED">Used</option>
    </select>

    <select id="category">
        <option value="">Select Category</option>
        <option value="CLOTHING">Clothing</option>
        <option value="FOOTWEAR">Footwear</option>
        <option value="ACCESSORIES">Accessories</option>
        <option value="SPORTSWEAR">Sportswear</option>
        <option value="OTHER">Other</option>
    </select>

    <h3 style="font-weight:600; margin-top:20px;">Existing Images</h3>
    <div id="existingImages" class="image-preview"></div>

    <h3 style="font-weight:600; margin-top:20px;">Upload New Images (optional)</h3>

    <div id="dropZone">Drag & Drop Images Here</div>

    <input id="newImages" type="file" multiple style="margin-top:10px;">
    <div id="newImagePreview" class="image-preview"></div>

    <button id="save-btn">Save Changes</button>
    <button id="cancel-btn">Cancel</button>

    <div id="message" class="message"></div>
</div>

<script>
let listingId = null;
let newSelectedFiles = [];

function showMessage(text, type="error") {
    const box = document.getElementById("message");
    box.textContent = text;
    box.className = "message " + type;
}

async function loadListing() {
    const params = new URLSearchParams(window.location.search);
    listingId = params.get("id");

    const res = await fetch(`/api/listings/${listingId}`, {
        credentials: "include"
    });

    const listing = await res.json();

    document.getElementById("title").value = listing.title;
    document.getElementById("description").value = listing.description;
    document.getElementById("price").value = listing.price;
    document.getElementById("brand").value = listing.brand;
    document.getElementById("size").value = listing.size;
    document.getElementById("condition").value = listing.itemCondition;
    document.getElementById("category").value = listing.category;

    const container = document.getElementById("existingImages");

    listing.images.forEach(img => {
        const wrapper = document.createElement("div");
        wrapper.className = "image-wrapper";

        const image = document.createElement("img");
        image.src = img.imageUrl;
        wrapper.appendChild(image);

        if (img.publicId) {
            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.className = "delete-checkbox";
            checkbox.value = img.publicId;
            wrapper.appendChild(checkbox);

            const trash = document.createElement("div");
            trash.className = "trash-icon";
            trash.innerHTML = "🗑️";
            trash.onclick = () => {
                checkbox.checked = !checkbox.checked;
                wrapper.classList.toggle("selected", checkbox.checked);
            };
            wrapper.appendChild(trash);
        }

        container.appendChild(wrapper);
    });
}

const dropZone = document.getElementById("dropZone");
const newImagesInput = document.getElementById("newImages");

dropZone.addEventListener("dragover", e => {
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    const dropped = Array.from(e.dataTransfer.files);
    newSelectedFiles = newSelectedFiles.concat(dropped);
    updateNewImagesInput();
    renderNewPreviews();
});

newImagesInput.addEventListener("change", function () {
    const newFiles = Array.from(this.files);
    newSelectedFiles = newSelectedFiles.concat(newFiles);
    updateNewImagesInput();
    renderNewPreviews();
});

function updateNewImagesInput() {
    const dataTransfer = new DataTransfer();
    newSelectedFiles.forEach(f => dataTransfer.items.add(f));
    newImagesInput.files = dataTransfer.files;
}

function renderNewPreviews() {
    const preview = document.getElementById("newImagePreview");
    preview.innerHTML = "";
    newSelectedFiles.forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
            const wrapper = document.createElement("div");
            wrapper.className = "image-wrapper";
            const img = document.createElement("img");
            img.src = e.target.result;
            wrapper.appendChild(img);
            preview.appendChild(wrapper);
        };
        reader.readAsDataURL(file);
    });
}

document.getElementById("save-btn").onclick = async () => {
    const updated = {
        title: document.getElementById("title").value,
        description: document.getElementById("description").value,
        price: Number(document.getElementById("price").value),
        brand: document.getElementById("brand").value,
        size: document.getElementById("size").value,
        itemCondition: document.getElementById("condition").value,
        category: document.getElementById("category").value
    };

    const formData = new FormData();
    formData.append("data", JSON.stringify(updated));

    const toDelete = [];
    document.querySelectorAll(".delete-checkbox:checked").forEach(cb => {
        toDelete.push(cb.value);
    });

    formData.append("deleteImages", JSON.stringify(toDelete));

    for (let img of newImagesInput.files) {
        formData.append("images", img);
    }

    const res = await fetch(`/api/listings/${listingId}`, {
        method: "PUT",
        body: formData,
        credentials: "include"
    });

    if (res.ok) {
        showMessage("Listing updated successfully!", "success");
        setTimeout(() => {
            window.location.href = "my-listings.html";
        }, 1200);
    } else {
        showMessage("Failed to update listing.", "error");
    }
};

document.getElementById("cancel-btn").onclick = () => {
    window.location.href = "my-listings.html";
};

loadListing();
</script>

</body>
</html>
