<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Listing</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #d7f5d0;
            margin: 0;
            padding: 0;
            color: black;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 35px;
            border-radius: 12px;
            border: 3px solid #ff7ebf;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 2px solid black;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 12px;
            font-size: 18px;
            font-weight: 600;
            border: 2px solid black;
        }

        #save-btn {
            background: #ff7ebf;
            color: black;
        }

        #save-btn:hover {
            background: #ff9ad0;
        }

        #cancel-btn {
            background: black;
            color: white;
        }

        #cancel-btn:hover {
            background: #333;
        }

        .image-preview {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin-top: 10px;
        }

        .image-preview img {
            height: 120px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid black;
        }

        .message {
            margin-top: 15px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<div id="navbar"></div>
<script>
    fetch("/navbar.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("navbar").innerHTML = html;
        });
</script>

<div class="container">
    <h2>Edit Listing</h2>

    <input id="title" type="text" placeholder="Title">
    <textarea id="description" placeholder="Description"></textarea>
    <input id="price" type="number" placeholder="Price (£)" step="0.01">

    <input id="brand" type="text" placeholder="Brand">
    <input id="size" type="text" placeholder="Size">

    <select id="condition">
        <option value="">Select Condition</option>
        <option value="NEW">New</option>
        <option value="USED">Used</option>
    </select>

    <select id="category">
        <option value="">Select Category</option>
        <option value="ELECTRONICS">Electronics</option>
        <option value="FASHION">Fashion</option>
        <option value="HOME">Home</option>
        <option value="SPORTS">Sports</option>
        <option value="OTHER">Other</option>
    </select>

    <h3 style="font-weight:600; margin-top:20px;">Existing Images</h3>
    <div id="existingImages" class="image-preview"></div>

    <h3 style="font-weight:600; margin-top:20px;">Upload New Images (optional)</h3>
    <input id="newImages" type="file" multiple>

    <button id="save-btn">Save Changes</button>
    <button id="cancel-btn">Cancel</button>

    <div id="message" class="message"></div>
</div>

<script>
let listingId = null;

function showMessage(text, type="error") {
    const box = document.getElementById("message");
    box.textContent = text;
    box.className = "message " + type;
}

async function loadListing() {
    const params = new URLSearchParams(window.location.search);
    listingId = params.get("id");

    const res = await fetch(`http://localhost:8080/api/listings/${listingId}`, {
        credentials: "include"
    });

    const listing = await res.json();

    document.getElementById("title").value = listing.title;
    document.getElementById("description").value = listing.description;
    document.getElementById("price").value = listing.price;
    document.getElementById("brand").value = listing.brand;
    document.getElementById("size").value = listing.size;
    document.getElementById("condition").value = listing.itemCondition;
    document.getElementById("category").value = listing.category;

    const container = document.getElementById("existingImages");
    listing.images.forEach(img => {
        const image = document.createElement("img");
        image.src = img.imageUrl;
        container.appendChild(image);
    });
}

document.getElementById("save-btn").onclick = async () => {
    const updated = {
        title: document.getElementById("title").value,
        description: document.getElementById("description").value,
        price: Number(document.getElementById("price").value),
        brand: document.getElementById("brand").value,
        size: document.getElementById("size").value,
        itemCondition: document.getElementById("condition").value,
        category: document.getElementById("category").value
    };

    const formData = new FormData();
    formData.append("data", JSON.stringify(updated));

    const newImages = document.getElementById("newImages").files;
    for (let img of newImages) {
        formData.append("images", img);
    }

    const res = await fetch(`http://localhost:8080/api/listings/${listingId}`, {
        method: "PUT",
        body: formData,
        credentials: "include"
    });

    if (res.ok) {
        showMessage("Listing updated successfully!", "success");
        setTimeout(() => {
            window.location.href = "my-listings.html";
        }, 1200);
    } else {
        showMessage("Failed to update listing.", "error");
    }
};

document.getElementById("cancel-btn").onclick = () => {
    window.location.href = "my-listings.html";
};

loadListing();
</script>

</body>
</html>
