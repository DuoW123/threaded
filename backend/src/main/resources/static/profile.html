<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 0;
            color: black;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 35px;
            border-radius: 12px;
            border: 3px solid #ff7ebf;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }

        h2 {
            margin-top: 0;
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
        }

        p {
            font-size: 18px;
            font-weight: 500;
        }

        .toggle-box {
            margin-top: 20px;
            padding: 20px;
            background: #f7f7f7;
            border-radius: 10px;
            border: 2px solid black;
        }

        button {
            padding: 12px 20px;
            background: #ff7ebf;
            border: 2px solid black;
            color: black;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
        }

        button:hover {
            background: #ff9ad0;
        }

        .logout-btn {
            background: black;
            color: white;
        }

        .logout-btn:hover {
            background: #333;
        }

        .message {
            margin-top: 15px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<div id="navbar"></div>

<script>
async function updateCartCount() {
    const el = document.getElementById("cartCount");
    if (!el) return;

    const res = await fetch("http://localhost:8080/api/cart", { credentials: "include" });
    if (!res.ok) {
        el.textContent = 0;
        return;
    }

    const cart = await res.json();
    el.textContent = cart.length;
}
</script>

<script>
    fetch("/navbar.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("navbar").innerHTML = html;
            updateCartCount();
        });
</script>

<div class="container">
    <h2>Your Profile</h2>

    <p><strong>Username:</strong> <span id="username">Loading...</span></p>
    <p><strong>Email:</strong> <span id="email">Loading...</span></p>

    <p><strong>Two-Factor Authentication:</strong></p>

    <div class="toggle-box">
        <p id="twofa-status">Loading...</p>
        <button id="toggle-btn">Toggle 2FA</button>
    </div>

    <button class="logout-btn" onclick="logout()">Logout</button>

    <div id="message" class="message"></div>
</div>

<script>
    const toggleBtn = document.getElementById("toggle-btn");
    const statusText = document.getElementById("twofa-status");
    const messageBox = document.getElementById("message");

    let twoFactorEnabled = false;

    function updateStatus() {
        statusText.textContent = twoFactorEnabled ? "Enabled" : "Disabled";
    }

    function showMessage(text, type="error") {
        messageBox.textContent = text;
        messageBox.className = "message " + type;
    }

    toggleBtn.onclick = async () => {
        const newState = !twoFactorEnabled;

        const res = await fetch("/api/auth/toggle-two-factor", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ enabled: newState })
        });

        const data = await res.json();

        if (!data.success) {
            showMessage(data.message, "error");
            return;
        }

        twoFactorEnabled = newState;
        updateStatus();
        showMessage(data.message, "success");
    };

    function logout() {
        document.cookie = "JSESSIONID=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        window.location.href = "/login.html";
    }

    updateStatus();
</script>

<script>
async function loadProfile() {
    const res = await fetch("http://localhost:8080/api/auth/me", {
        credentials: "include"
    });

    const data = await res.json();

    if (data.success) {
        document.getElementById("username").textContent = data.data.username;
        document.getElementById("email").textContent = data.data.email;
        twoFactorEnabled = data.data.twoFactorEnabled;
        updateStatus();
    }
}

loadProfile();
</script>

</body>
</html>
