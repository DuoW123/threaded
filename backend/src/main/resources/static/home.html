<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THREADED — Home</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fafafa;
            font-family: 'Poppins', sans-serif;
            color: black;
        }

        .navbar {
            background: black;
            padding: 18px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-size: 18px;
        }

        .container {
            padding: 40px 20px;
            max-width: 1100px;
            margin: auto;
            text-align: left;
        }

        h2 {
            font-size: 30px;
            margin-bottom: 5px;
            font-weight: 700;
        }

        h3 {
            margin-top: 25px;
            font-size: 22px;
            font-weight: 600;
        }

        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .listing-card {
            background: white;
            border: 3px solid #ff7ebf;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .listing-card:hover {
            transform: scale(1.03);
        }

        .listing-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 8px;
        }

        .listing-card h4 {
            margin: 10px 0 5px;
            font-size: 18px;
            font-weight: 600;
        }

        .listing-card .price {
            font-weight: 700;
            font-size: 18px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            margin-top: 25px;
            gap: 10px;
        }

        .pagination button {
            padding: 10px 16px;
            border-radius: 8px;
            border: 2px solid black;
            background: #ff7ebf;
            cursor: pointer;
            font-weight: 600;
        }

        .pagination button.active {
            background: black;
            color: white;
        }

        .pagination button:hover {
            background: #ff9ad0;
        }
    </style>
</head>
<body>

<div id="navbar"></div>
<script>
    fetch("/navbar.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("navbar").innerHTML = html;
        });
</script>

<div class="container">
    <h2 id="welcome">Welcome back!</h2>

    <h3>Latest Listings</h3>
    <div id="listings" class="listings-grid"></div>
    <div id="pagination" class="pagination"></div>
</div>

<script>
async function loadUser() {
    const res = await fetch("http://localhost:8080/api/auth/me", {
        credentials: "include"
    });

    const data = await res.json();

    if (data.success) {
        document.getElementById("welcome").textContent =
            `Welcome back, ${data.data.username}`;
    }
}

loadUser();
</script>

<script>
let currentPage = 0;
const pageSize = 12;

async function loadListings() {
    const url = `http://localhost:8080/api/listings?page=${currentPage}&pageSize=${pageSize}`;

    const res = await fetch(url, { credentials: "include" });
    const data = await res.json();

    const listings = data.content;
    const totalPages = data.totalPages;

    const container = document.getElementById("listings");
    container.innerHTML = "";

    if (!listings || listings.length === 0) {
        container.innerHTML = `
            <div style="
                grid-column: 1 / -1;
                text-align: center;
                font-size: 32px;
                font-weight: 700;
                color: #ff7ebf;
                margin-top: 100px;
            ">
                No listings available — come back later
            </div>
        `;
        document.getElementById("pagination").innerHTML = "";
        return;
    }   

    listings.forEach(item => {
        const card = document.createElement("div");
        card.className = "listing-card";

        const imageUrl =
            item.images && item.images.length > 0
                ? item.images[0].imageUrl
                : "/placeholder.png";

        card.onclick = () => window.location.href = `/listing.html?id=${item.id}`;

        card.innerHTML = `
            <img src="${imageUrl}">
            <h4>${item.title}</h4>
            <div class="price">£${item.price}</div>
        `;

        container.appendChild(card);
    });

    renderPagination(totalPages);
}

function renderPagination(totalPages) {
    const pagination = document.getElementById("pagination");
    pagination.innerHTML = "";

    if (totalPages <= 1) return;

    const prev = document.createElement("button");
    prev.textContent = "Prev";
    prev.disabled = currentPage === 0;
    prev.onclick = () => {
        currentPage--;
        loadListings();
    };
    pagination.appendChild(prev);

    for (let i = 0; i < totalPages; i++) {
        const btn = document.createElement("button");
        btn.textContent = i + 1;
        if (i === currentPage) btn.classList.add("active");
        btn.onclick = () => {
            currentPage = i;
            loadListings();
        };
        pagination.appendChild(btn);
    }

    const next = document.createElement("button");
    next.textContent = "Next";
    next.disabled = currentPage === totalPages - 1;
    next.onclick = () => {
        currentPage++;
        loadListings();
    };
    pagination.appendChild(next);
}

loadListings();
</script>

</body>
</html>
