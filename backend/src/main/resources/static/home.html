<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THREADED — Home</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #d7f5d0;
            font-family: 'Poppins', sans-serif;
            color: black;
        }

        .navbar {
            background: black;
            padding: 18px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-size: 18px;
        }

        .container {
            padding: 40px 20px;
            max-width: 1100px;
            margin: auto;
            text-align: left;
        }

        h2 {
            font-size: 30px;
            margin-bottom: 5px;
            font-weight: 700;
        }

        h3 {
            margin-top: 25px;
            font-size: 22px;
            font-weight: 600;
        }

        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .listing-card {
            background: white;
            border: 3px solid #ff7ebf;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .listing-card:hover {
            transform: scale(1.03);
        }

        .listing-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 8px;
        }

        .listing-card h4 {
            margin: 10px 0 5px;
            font-size: 18px;
            font-weight: 600;
        }

        .listing-card .price {
            font-weight: 700;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div id="navbar"></div>
<script>
    fetch("/navbar.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("navbar").innerHTML = html;
        });
</script>

<div class="container">
    <h2 id="welcome">Welcome back!</h2>

    <h3>Latest Listings</h3>
    <div id="listings" class="listings-grid"></div>
</div>

<script>
async function loadUser() {
    const res = await fetch("http://localhost:8080/api/auth/me", {
        credentials: "include"
    });

    const data = await res.json();

    if (data.success) {
        document.getElementById("welcome").textContent =
            `Welcome back, ${data.data.username}`;
    }
}

loadUser();
</script>

<script>
async function loadListings() {
    const res = await fetch("http://localhost:8080/api/listings", {
        credentials: "include"
    });

    const data = await res.json();

    const listings = Array.isArray(data) ? data : Object.values(data);

    const container = document.getElementById("listings");
    container.innerHTML = "";

    listings.forEach(item => {
        const card = document.createElement("div");
        card.className = "listing-card";

        const imageUrl =
            item.images && item.images.length > 0
                ? item.images[0].imageUrl
                : "/placeholder.png";

        card.onclick = () => window.location.href = `/listing.html?id=${item.id}`;

        card.innerHTML = `
            <img src="${imageUrl}">
            <h4>${item.title}</h4>
            <div class="price">£${item.price}</div>
        `;

        container.appendChild(card);
    });
}

loadListings();
</script>

</body>
</html>
