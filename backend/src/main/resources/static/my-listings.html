<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Listings</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 0;
            color: black;
        }

        .container {
            padding: 40px 20px;
            max-width: 1100px;
            margin: auto;
        }

        h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .listing-card {
            background: white;
            padding: 12px;
            border-radius: 12px;
            border: 3px solid #ff7ebf;
            text-align: center;
            transition: transform 0.1s ease;
            position: relative;
        }

        .listing-card:hover {
            transform: scale(1.03);
        }

        .image-wrapper {
            position: relative;
        }

        .listing-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid black;
        }

        .sold-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            color: #ff7ebf;
            text-shadow: 0 0 6px black;
            pointer-events: none;
        }

        .listing-card h4 {
            margin: 12px 0 5px;
            font-size: 18px;
            font-weight: 600;
        }

        .price {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 12px;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid black;
            font-size: 16px;
            font-weight: 600;
        }

        .btn-edit {
            background: #ff7ebf;
            color: black;
        }

        .btn-edit:hover {
            background: #ff9ad0;
        }

        .btn-delete {
            background: black;
            color: white;
        }

        .btn-delete:hover {
            background: #333;
        }

        .pagination {
            display: flex;
            justify-content: center;
            margin-top: 25px;
            gap: 10px;
        }

        .pagination button {
            padding: 10px 16px;
            border-radius: 8px;
            border: 2px solid black;
            background: #ff7ebf;
            cursor: pointer;
            font-weight: 600;
        }

        .pagination button.active {
            background: black;
            color: white;
        }

        .pagination button:hover {
            background: #ff9ad0;
        }
    </style>
</head>
<body>

<div id="navbar"></div>

<script>
async function updateCartCount() {
    const el = document.getElementById("cartCount");
    if (!el) return;

    const res = await fetch("http://localhost:8080/api/cart", { credentials: "include" });
    if (!res.ok) {
        el.textContent = 0;
        return;
    }

    const cart = await res.json();
    el.textContent = cart.length;
}
</script>

<script>
    fetch("/navbar.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("navbar").innerHTML = html;
            updateCartCount();
        });
</script>

<div class="container">
    <h2>My Listings</h2>
    <div id="listings" class="listings-grid"></div>
    <div id="pagination" class="pagination"></div>
</div>

<script>
let currentPage = 0;
const pageSize = 12;

async function loadMyListings() {
    const url = `/api/listings/me?page=${currentPage}&pageSize=${pageSize}`;

    const res = await fetch(url, { credentials: "include" });

    if (!res.ok) {
        document.getElementById("listings").innerHTML =
            "<p>You must be logged in to view your listings.</p>";
        return;
    }

    const data = await res.json();
    const listings = data.content;
    const totalPages = data.totalPages;

    const container = document.getElementById("listings");
    container.innerHTML = "";

    if (!listings || listings.length === 0) {
        container.innerHTML = `
            <div style="
                grid-column: 1 / -1;
                text-align: center;
                font-size: 32px;
                font-weight: 700;
                color: #ff7ebf;
                margin-top: 100px;
            ">
                You don't have any listings yet!
            </div>

            <div style="
                grid-column: 1 / -1;
                text-align: center;
                margin-top: 20px;
            ">
                <button onclick="window.location.href='/create-listing.html'" style="
                    padding: 14px 22px;
                    background: #ff7ebf;
                    border: 2px solid black;
                    border-radius: 10px;
                    font-size: 18px;
                    font-weight: 600;
                    cursor: pointer;
                ">
                    Create your first listing
                </button>
            </div>
        `;
        document.getElementById("pagination").innerHTML = "";
        return;
    }

    listings.forEach(item => {
        const card = document.createElement("div");
        card.className = "listing-card";

        const imageUrl =
            item.images && item.images.length > 0
                ? item.images[0].imageUrl
                : "/placeholder.png";

        let overlay = "";
        let editButton = "";

        if (item.listingStatus === "SOLD") {
            overlay = `<div class="sold-overlay">SOLD</div>`;
        } else {
            editButton = `<button class="btn btn-edit" onclick="editListing(${item.id})">Edit</button>`;
        }

        card.innerHTML = `
            <div class="image-wrapper">
                <img src="${imageUrl}">
                ${overlay}
            </div>
            <h4>${item.title}</h4>
            <div class="price">£${item.price}</div>

            <div class="actions">
                ${editButton}
                <button class="btn btn-delete" onclick="deleteListing(${item.id})">Delete</button>
            </div>
        `;

        container.appendChild(card);
    });

    renderPagination(totalPages);
}

function renderPagination(totalPages) {
    const pagination = document.getElementById("pagination");
    pagination.innerHTML = "";

    if (totalPages <= 1) return;

    const prev = document.createElement("button");
    prev.textContent = "Prev";
    prev.disabled = currentPage === 0;
    prev.onclick = () => {
        currentPage--;
        loadMyListings();
    };
    pagination.appendChild(prev);

    for (let i = 0; i < totalPages; i++) {
        const btn = document.createElement("button");
        btn.textContent = i + 1;
        if (i === currentPage) btn.classList.add("active");
        btn.onclick = () => {
            currentPage = i;
            loadMyListings();
        };
        pagination.appendChild(btn);
    }

    const next = document.createElement("button");
    next.textContent = "Next";
    next.disabled = currentPage === totalPages - 1;
    next.onclick = () => {
        currentPage++;
        loadMyListings();
    };
    pagination.appendChild(next);
}

function editListing(id) {
    window.location.href = `/edit-listing.html?id=${id}`;
}

async function deleteListing(id) {
    if (!confirm("Are you sure you want to delete this listing?")) return;

    const res = await fetch(`/api/listings/${id}`, {
        method: "DELETE",
        credentials: "include"
    });

    if (res.ok) {
        alert("Listing deleted.");
        loadMyListings();
    } else {
        alert("Failed to delete listing.");
    }
}

loadMyListings();
</script>

</body>
</html>
