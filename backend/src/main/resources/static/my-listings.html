<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Listings</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #d7f5d0;
            margin: 0;
            padding: 0;
            color: black;
        }

        .container {
            padding: 40px 20px;
            max-width: 1100px;
            margin: auto;
        }

        h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .listing-card {
            background: white;
            padding: 12px;
            border-radius: 12px;
            border: 3px solid #ff7ebf;
            text-align: center;
            transition: transform 0.1s ease;
        }

        .listing-card:hover {
            transform: scale(1.03);
        }

        .listing-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid black;
        }

        .listing-card h4 {
            margin: 12px 0 5px;
            font-size: 18px;
            font-weight: 600;
        }

        .price {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 12px;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid black;
            font-size: 16px;
            font-weight: 600;
        }

        .btn-edit {
            background: #ff7ebf;
            color: black;
        }

        .btn-edit:hover {
            background: #ff9ad0;
        }

        .btn-delete {
            background: black;
            color: white;
        }

        .btn-delete:hover {
            background: #333;
        }
    </style>
</head>
<body>

<div id="navbar"></div>
<script>
    fetch("/navbar.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("navbar").innerHTML = html;
        });
</script>

<div class="container">
    <h2>My Listings</h2>
    <div id="listings" class="listings-grid"></div>
</div>

<script>
async function loadMyListings() {
    const res = await fetch("http://localhost:8080/api/listings/me", {
        credentials: "include"
    });

    if (!res.ok) {
        document.getElementById("listings").innerHTML =
            "<p>You must be logged in to view your listings.</p>";
        return;
    }

    const data = await res.json();
    const listings = Array.isArray(data) ? data : Object.values(data);

    const container = document.getElementById("listings");
    container.innerHTML = "";

    listings.forEach(item => {
        const card = document.createElement("div");
        card.className = "listing-card";

        const imageUrl =
            item.images && item.images.length > 0
                ? item.images[0].imageUrl
                : "/placeholder.png";

        card.innerHTML = `
            <img src="${imageUrl}">
            <h4>${item.title}</h4>
            <div class="price">£${item.price}</div>

            <div class="actions">
                <button class="btn btn-edit" onclick="editListing(${item.id})">Edit</button>
                <button class="btn btn-delete" onclick="deleteListing(${item.id})">Delete</button>
            </div>
        `;

        container.appendChild(card);
    });
}

function editListing(id) {
    window.location.href = `/edit-listing.html?id=${id}`;
}

async function deleteListing(id) {
    if (!confirm("Are you sure you want to delete this listing?")) return;

    const res = await fetch(`http://localhost:8080/api/listings/${id}`, {
        method: "DELETE",
        credentials: "include"
    });

    if (res.ok) {
        alert("Listing deleted.");
        loadMyListings();
    } else {
        alert("Failed to delete listing.");
    }
}

loadMyListings();
</script>

</body>
</html>
