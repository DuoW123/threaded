<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Browse Listings</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 0;
            color: black;
        }

        .container {
            padding: 40px 20px;
            max-width: 1100px;
            margin: auto;
        }

        .search-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }

        .search-bar input,
        .search-bar select {
            padding: 12px;
            border-radius: 8px;
            border: 2px solid black;
            font-size: 14px;
        }

        .top-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
        }

        .bottom-row {
            display: flex;
            width: 100%;
        }

        #search {
            flex: 1;
        }

        .top-row select {
            flex: 1;
            min-width: 140px;
        }

        .price-input {
            flex: 0.5;
            max-width: 120px;
        }

        .search-bar button {
            padding: 12px 20px;
            background: #ff7ebf;
            color: black;
            border-radius: 8px;
            cursor: pointer;
            min-width: 140px;
            font-weight: 600;
            border: 2px solid black;
            font-size: 16px;
        }

        .search-bar button:hover {
            background: #ff9ad0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            border: 3px solid #ff7ebf;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: transform 0.1s ease;
            text-align: center;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid black;
        }

        .card h3 {
            margin: 10px 0 5px;
            font-size: 18px;
            font-weight: 600;
        }

        .card p {
            margin: 5px 0;
            color: #444;
            font-size: 14px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            margin-top: 25px;
            gap: 10px;
        }

        .pagination button {
            padding: 10px 16px;
            border-radius: 8px;
            border: 2px solid black;
            background: #ff7ebf;
            cursor: pointer;
            font-weight: 600;
        }

        .pagination button.active {
            background: black;
            color: white;
        }

        .pagination button:hover {
            background: #ff9ad0;
        }
    </style>
    <link rel="stylesheet" href="/responsive.css">

</head>
<body>

<div id="navbar"></div>

<script>
async function updateCartCount() {
    const desktopEl = document.getElementById("cartCountDesktop");
    const mobileEl = document.getElementById("cartCount");

    const res = await fetch("/api/cart", { credentials: "include" });
    if (!res.ok) {
        if (desktopEl) desktopEl.textContent = 0;
        if (mobileEl) mobileEl.textContent = 0;
        return;
    }

    const cart = await res.json();
    const count = cart.length;

    if (desktopEl) desktopEl.textContent = count;
    if (mobileEl) mobileEl.textContent = count;
}
</script>

<script>
fetch("/navbar.html")
    .then(res => res.text())
    .then(html => {
        const nav = document.getElementById("navbar");
        nav.innerHTML = html;
        nav.style.display = "block";

        const h = document.getElementById("hamburger");
        if (h) {
            h.addEventListener("click", () => {
                const m = document.getElementById("mobileMenu");
                m.classList.toggle("open");
            });
        }

        updateCartCount && updateCartCount();
    });
</script>

<div class="container">
    <div class="search-bar">

        <div class="top-row">
            <select id="size">
                <option value="">Size</option>
                <option value="XS">XS</option>
                <option value="S">S</option>
                <option value="M">M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
                <option value="XXL">XXL</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
            </select>

            <select id="condition">
                <option value="">Condition</option>
                <option value="NEW">New</option>
                <option value="USED">Used</option>
            </select>

            <select id="category">
                <option value="">Category</option>
                <option value="CLOTHING">Clothing</option>
                <option value="FOOTWEAR">Footwear</option>
                <option value="ACCESSORIES">Accessories</option>
                <option value="SPORTSWEAR">Sportswear</option>
                <option value="OTHER">Other</option>
            </select>

            <select id="sortBy">
                <option value="newest">Newest</option>
                <option value="price_ascending">Price: Low to High</option>
                <option value="price_descending">Price: High to Low</option>
            </select>

            <input id="minPrice" class="price-input" type="number" placeholder="Min £" step="5" min="0">
            <input id="maxPrice" class="price-input" type="number" placeholder="Max £" step="5" min="0">

            <button onclick="applyFilters()">Filter</button>
        </div>

        <div class="bottom-row">
            <input id="search" type="text" placeholder="Search listings...">
        </div>

    </div>

    <div id="grid" class="grid"></div>
    <div id="pagination" class="pagination"></div>
</div>

<script>
    let currentPage = 0;
    const pageSize = 12;

    function applyFilters() {
        currentPage = 0;
        loadListings();
    }

    async function loadListings() {
        const params = new URLSearchParams();
        params.append("page", currentPage);
        params.append("pageSize", pageSize);
        params.append("sold", "false");

        const search = document.getElementById("search").value;
        const size = document.getElementById("size").value;
        const condition = document.getElementById("condition").value;
        const category = document.getElementById("category").value;
        const minPrice = document.getElementById("minPrice").value;
        const maxPrice = document.getElementById("maxPrice").value;
        const sortBy = document.getElementById("sortBy").value;

        if (search) params.append("search", search);
        if (size) params.append("size", size);
        if (condition) params.append("condition", condition);
        if (category) params.append("category", category);
        if (minPrice) params.append("minPrice", minPrice);
        if (maxPrice) params.append("maxPrice", maxPrice);
        if (sortBy) params.append("sortBy", sortBy);

        const res = await fetch(`/api/listings?${params.toString()}`, { credentials: "include" });
        const data = await res.json();

        const listings = data.content;

        const grid = document.getElementById("grid");
        grid.innerHTML = "";

        if (!listings || listings.length === 0) {
            grid.innerHTML = `
                <div style="
                    grid-column: 1 / -1;
                    text-align: center;
                    font-size: 28px;
                    font-weight: 600;
                    color: #ff7ebf;
                    margin-top: 80px;
                ">
                    No listings available — come back later
                </div>
            `;

            document.getElementById("pagination").innerHTML = "";
            return;
        }

        listings.forEach(listing => {
            const card = document.createElement("div");
            card.className = "card";
            card.onclick = () => window.location.href = `/listing.html?id=${listing.id}`;

            const img =
                listing.images && listing.images.length > 0
                    ? listing.images[0].imageUrl
                    : "/placeholder.png";

            card.innerHTML = `
                <img src="${img}">
                <h3>${listing.title}</h3>
                <p><strong>£${listing.price}</strong></p>
                <p>${listing.itemCondition} • ${listing.category}</p>
            `;

            grid.appendChild(card);
        });

        renderPagination(data.totalPages);
    }

    function renderPagination(totalPages) {
        const pagination = document.getElementById("pagination");
        pagination.innerHTML = "";

        if (totalPages <= 1) return;

        const prev = document.createElement("button");
        prev.textContent = "Prev";
        prev.disabled = currentPage === 0;
        prev.onclick = () => {
            currentPage--;
            loadListings();
        };
        pagination.appendChild(prev);

        for (let i = 0; i < totalPages; i++) {
            const btn = document.createElement("button");
            btn.textContent = i + 1;
            if (i === currentPage) btn.classList.add("active");
            btn.onclick = () => {
                currentPage = i;
                loadListings();
            };
            pagination.appendChild(btn);
        }

        const next = document.createElement("button");
        next.textContent = "Next";
        next.disabled = currentPage === totalPages - 1;
        next.onclick = () => {
            currentPage++;
            loadListings();
        };
        pagination.appendChild(next);
    }

    loadListings();
</script>

</body>
</html>
