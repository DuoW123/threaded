<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: black;
        }

        .title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .login-box {
            background: white;
            width: 100%;
            max-width: 360px;
            padding: 20px;
            border-radius: 12px;
            border: 3px solid #ff7ebf;
            box-sizing: border-box;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 18px;
            font-size: 20px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 2px solid black;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: 2px solid black;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: black;
            background: #ff7ebf;
        }

        #register-btn {
            background: black;
            color: white;
        }

        #login-btn:hover {
            background: #ff9ad0;
        }

        #register-btn:hover {
            background: #333;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .success {
            color: green;
            margin-top: 10px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid #ff7ebf;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #ff7ebf;
            font-weight: 600;
        }

    </style>
</head>
<body>

<div class="title">THREADED</div>

<div class="login-box">
    <h2>Login</h2>

    <input id="username" type="text" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button id="login-btn">Login</button>
    <button id="register-btn">Create Account</button>

    <div id="message"></div>
</div>

<script>
    const msg = document.getElementById("message");

    function show(text, type="error") {
        msg.textContent = text;
        msg.className = type;
    }

    document.getElementById("register-btn").onclick = () => {
        window.location.href = "register.html";
    };

    document.getElementById("login-btn").onclick = async () => {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        msg.innerHTML = `<span class="spinner"></span><span class="loading-text">Loading...</span>`;

        const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!data.success) {
            show(data.message, "error");
            return;
        }

        if (data.data === true) {
            window.location.href = "twofactor.html?username=" + encodeURIComponent(username);
            return;
        }

        show("Login successful!", "success");

        setTimeout(() => window.location.href = "home.html", 800);
    };
</script>

</body>
</html>
