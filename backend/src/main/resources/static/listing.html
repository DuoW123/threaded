<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Listing Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 0;
            color: black;
        }

        .container {
            padding: 30px;
            max-width: 900px;
            margin: 30px auto;
            background: white;
            border-radius: 12px;
            border: 3px solid #ff7ebf;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }

        .back-btn {
            display: inline-block;
            padding: 10px 16px;
            background: black;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            border: 2px solid black;
        }

        .back-btn:hover {
            background: #333;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 20px auto 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .carousel-image {
            max-width: 100%;
            max-height: 650px;
            object-fit: contain;
            border-radius: 12px;
            border: 3px solid black;
            cursor: zoom-in;
            position: relative;
            z-index: 2;
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: #ff7ebf;
            border: 3px solid black;
            color: black;
            font-size: 26px;
            font-weight: 800;
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }

        .arrow:hover {
            background: #ff9ad0;
        }

        .arrow-left {
            left: 25%;
        }

        .arrow-right {
            right: 25%;
        }

        .image-count {
            text-align: center;
            font-weight: 600;
            font-size: 17px;
            margin-top: 4px;
            margin-bottom: 15px;
        }

        h2 {
            margin-top: 0;
            font-size: 30px;
            font-weight: 700;
        }

        .price {
            font-size: 26px;
            margin: 10px 0;
            font-weight: 700;
        }

        .meta {
            color: #444;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .actions {
            margin-top: 25px;
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid black;
            font-size: 18px;
            font-weight: 600;
        }

        .btn-buy {
            background: #ff7ebf;
            color: black;
        }

        .btn-buy:hover {
            background: #ff9ad0;
        }

        .btn-add {
            background: white;
            color: black;
        }

        .btn-add:hover {
            background: #ffe6f3;
        }

        .btn-message {
            background: black;
            color: white;
        }

        .btn-message:hover {
            background: #333;
        }

        .btn-fav {
            background: #ffe066;
            color: black;
        }

        .btn-fav:hover {
            background: #ffcf33;
        }

        #soldBadge {
            display:none;
            background:black;
            color:white;
            padding:8px 14px;
            border-radius:8px;
            font-weight:700;
            font-size:18px;
            width:max-content;
            margin-top:10px;
        }
    </style>
</head>
<body>

<div id="navbar"></div>

<div class="container">
    <a href="/home.html" class="back-btn">← Back</a>

    <div class="carousel-container">
        <div class="arrow arrow-left" onclick="prevImage()">←</div>
        <img id="carouselImage" class="carousel-image" onclick="openFullImage()">
        <div class="arrow arrow-right" onclick="nextImage()">→</div>
    </div>

    <div id="imageCount" class="image-count"></div>

    <h2 id="title"></h2>
    <div id="price" class="price"></div>
    <div id="soldBadge">SOLD</div>
    <div id="meta" class="meta"></div>
    <p id="description"></p>

    <div class="actions">
        <button class="btn btn-buy" onclick="buyNow()">Buy Now</button>
        <button class="btn btn-add" onclick="addToCart(false)">Add to Cart</button>
        <button class="btn btn-message" onclick="messageSeller()">Message Seller</button>
        <button class="btn btn-fav" onclick="addToFavourites()">★ Add to Favourites</button>
    </div>
</div>

<script>
let listingData = null;
let images = [];
let currentIndex = 0;

async function loadNavbar() {
    const res = await fetch("/navbar.html");
    const html = await res.text();
    document.getElementById("navbar").innerHTML = html;
    updateCartBadgeBackend();
}

async function updateCartBadgeBackend() {
    const el = document.getElementById("cartCount");
    if (!el) return;
    const res = await fetch("http://localhost:8080/api/cart", { credentials: "include" });
    if (!res.ok) return;
    const cart = await res.json();
    el.textContent = cart.length;
}

async function loadListing() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const res = await fetch(`http://localhost:8080/api/listings/${id}`, {
        credentials: "include"
    });

    if (!res.ok) {
        document.body.innerHTML = "<h2>Listing not found.</h2>";
        return;
    }

    const listing = await res.json();
    listingData = listing;

    document.getElementById("title").textContent = listing.title;
    document.getElementById("price").textContent = "£" + listing.price;
    document.getElementById("description").textContent = listing.description;

    document.getElementById("meta").textContent =
        `${listing.brand} • Size ${listing.size} • ${listing.itemCondition} • ${listing.category}`;

    if (listing.images && listing.images.length > 0) {
        images = listing.images.map(i => i.imageUrl);
        document.getElementById("carouselImage").src = images[0];
        updateImageCount();
    }

    if (listing.sold) {
        document.getElementById("soldBadge").style.display = "inline-block";
        const buyBtn = document.querySelector(".btn-buy");
        const addBtn = document.querySelector(".btn-add");
        buyBtn.disabled = true;
        addBtn.disabled = true;
        buyBtn.style.opacity = "0.4";
        addBtn.style.opacity = "0.4";
        buyBtn.style.cursor = "not-allowed";
        addBtn.style.cursor = "not-allowed";
    }
}

function updateImageCount() {
    document.getElementById("imageCount").textContent =
        (currentIndex + 1) + " / " + images.length;
}

function prevImage() {
    if (images.length === 0) return;
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    document.getElementById("carouselImage").src = images[currentIndex];
    updateImageCount();
}

function nextImage() {
    if (images.length === 0) return;
    currentIndex = (currentIndex + 1) % images.length;
    document.getElementById("carouselImage").src = images[currentIndex];
    updateImageCount();
}

function openFullImage() {
    if (images.length > 0) {
        window.open(images[currentIndex], "_blank");
    }
}

async function addToCart(redirect) {
    if (!listingData) return;

    await fetch(`http://localhost:8080/api/cart/add/${listingData.id}`, {
        method: "POST",
        credentials: "include"
    });

    updateCartBadgeBackend();

    if (redirect) {
        window.location.href = "/cart.html";
    }
}

function buyNow() {
    addToCart(true);
}

function messageSeller() {
    if (!listingData) return;
    const sellerId = listingData.user.id;
    const listingId = listingData.id;
    window.location.href = `/messages.html?seller=${sellerId}&listing=${listingId}`;
}

function addToFavourites() {
    alert("Added to favourites (frontend only).");
}

loadNavbar();
loadListing();
</script>

</body>
</html>
