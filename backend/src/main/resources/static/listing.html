<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Listing Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 0;
            color: black;
        }

        .container {
            padding: 30px;
            max-width: 900px;
            margin: 30px auto;
            background: white;
            border-radius: 12px;
            border: 3px solid #ff7ebf;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 16px;
            background: black;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            border: 2px solid black;
        }

        #favStar {
            text-align:right;
            font-size:40px;
            font-weight:800;
            margin-bottom:10px;
            cursor:pointer;
            color:#ccc;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 20px auto 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .carousel-image {
            max-width: 100%;
            max-height: 650px;
            object-fit: contain;
            border-radius: 12px;
            border: 3px solid black;
            cursor: zoom-in;
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: #ff7ebf;
            border: 3px solid black;
            color: black;
            font-size: 26px;
            font-weight: 800;
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .arrow-left { left: 25%; }
        .arrow-right { right: 25%; }

        .image-count {
            text-align: center;
            font-weight: 600;
            font-size: 17px;
            margin-top: 4px;
            margin-bottom: 15px;
        }

        h2 {
            margin-top: 0;
            font-size: 30px;
            font-weight: 700;
        }

        .price {
            font-size: 26px;
            margin: 10px 0;
            font-weight: 700;
        }

        .meta {
            color: #444;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .actions {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid black;
            font-size: 18px;
            font-weight: 600;
        }

        .btn-buy { background: #ff7ebf; }
        .btn-add { background: white; }
        .btn-message { background: black; color: white; }
        .btn-fav { background: #ffe066; }
        .btn-ship { background: #ff7ebf; }
        .btn-receive { background: #ffe066; }

        #soldBadge {
            display:none;
            background:black;
            color:white;
            padding:8px 14px;
            border-radius:8px;
            font-weight:700;
            font-size:18px;
            width:max-content;
            margin-top:10px;
        }
    </style>
</head>
<body>

<div id="navbar"></div>

<div class="container">
    <a href="/home.html" class="back-btn">← Back</a>

    <div id="favStar">★</div>

    <div class="carousel-container">
        <div class="arrow arrow-left" onclick="prevImage()">←</div>
        <img id="carouselImage" class="carousel-image" onclick="openFullImage()">
        <div class="arrow arrow-right" onclick="nextImage()">→</div>
    </div>

    <div id="imageCount" class="image-count"></div>

    <h2 id="title"></h2>
    <div id="price" class="price"></div>
    <div id="soldBadge">SOLD</div>
    <div id="meta" class="meta"></div>
    <p id="description"></p>

    <div class="actions" id="actionButtons">
        <button class="btn btn-buy" onclick="buyNow()">Buy Now</button>
        <button class="btn btn-add" onclick="addToCart(false)">Add to Cart</button>
        <button class="btn btn-message" onclick="messageSeller()">Message Seller</button>
        <button id="favBtn" class="btn btn-fav" onclick="addToFavourites()">★ Add to Favourites</button>
    </div>
</div>

<script>
let listingData = null;
let images = [];
let currentIndex = 0;
let isFavourite = false;
let orderData = null;
let currentUserId = null;

async function loadNavbar() {
    const res = await fetch("/navbar.html");
    const html = await res.text();
    document.getElementById("navbar").innerHTML = html;
    updateCartBadgeBackend();
}

async function updateCartBadgeBackend() {
    const el = document.getElementById("cartCount");
    if (!el) return;
    const res = await fetch("http://localhost:8080/api/cart", { credentials: "include" });
    if (!res.ok) return;
    const cart = await res.json();
    el.textContent = cart.length;
}

async function loadUser() {
    const res = await fetch("http://localhost:8080/api/session/me", { credentials: "include" });
    if (!res.ok) return;
    const data = await res.json();
    currentUserId = data.id;
}

async function loadOrder(orderId) {
    const res = await fetch(`http://localhost:8080/api/orders/${orderId}`, { credentials: "include" });
    if (!res.ok) return;
    const data = await res.json();
    orderData = data.data;
}

async function loadListing() {
    await loadUser();

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const fromOrders = params.get("fromOrders") === "true";
    const orderId = params.get("orderId");

    if (fromOrders && orderId) {
        await loadOrder(orderId);
    }

    const res = await fetch(`http://localhost:8080/api/listings/${id}`, { credentials: "include" });
    if (!res.ok) {
        document.body.innerHTML = "<h2>Listing not found.</h2>";
        return;
    }

    const listing = await res.json();
    listingData = listing;

    document.getElementById("title").textContent = listing.title;
    document.getElementById("price").textContent = "£" + listing.price;
    document.getElementById("description").textContent = listing.description;

    document.getElementById("meta").textContent =
        `${listing.brand} • Size ${listing.size} • ${listing.itemCondition} • ${listing.category}`;

    if (listing.images && listing.images.length > 0) {
        images = listing.images.map(i => i.imageUrl);
        document.getElementById("carouselImage").src = images[0];
        updateImageCount();
    }

    if (listing.listingStatus === "SOLD") {
        document.getElementById("soldBadge").style.display = "inline-block";
        const buyBtn = document.querySelector(".btn-buy");
        const addBtn = document.querySelector(".btn-add");
        buyBtn.disabled = true;
        addBtn.disabled = true;
        buyBtn.style.opacity = "0.4";
        addBtn.style.opacity = "0.4";
        buyBtn.style.cursor = "not-allowed";
        addBtn.style.cursor = "not-allowed";
    }

    if (fromOrders) {
        document.querySelector(".btn-buy").style.display = "none";
        document.querySelector(".btn-add").style.display = "none";
        document.querySelector(".btn-fav").style.display = "none";
        addOrderButtons();
    }

    setTimeout(checkFavourite, 50);
}

function addOrderButtons() {
    if (!orderData) return;

    const container = document.getElementById("actionButtons");

    if (orderData.status === "PAID" && orderData.sellerId === currentUserId) {
        const btn = document.createElement("button");
        btn.className = "btn btn-ship";
        btn.textContent = "Mark as Shipped";
        btn.onclick = () => markShipped(orderData.id);
        container.appendChild(btn);
    }

    if (orderData.status === "SHIPPED" && orderData.buyerId === currentUserId) {
        const btn = document.createElement("button");
        btn.className = "btn btn-receive";
        btn.textContent = "Mark as Received";
        btn.onclick = () => markReceived(orderData.id);
        container.appendChild(btn);
    }
}

async function markShipped(orderId) {
    await fetch(`http://localhost:8080/api/orders/${orderId}/ship`, {
        method: "POST",
        credentials: "include"
    });
    location.reload();
}

async function markReceived(orderId) {
    await fetch(`http://localhost:8080/api/orders/${orderId}/receive`, {
        method: "POST",
        credentials: "include"
    });
    location.reload();
}

function updateImageCount() {
    document.getElementById("imageCount").textContent =
        (currentIndex + 1) + " / " + images.length;
}

function prevImage() {
    if (images.length === 0) return;
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    document.getElementById("carouselImage").src = images[currentIndex];
    updateImageCount();
}

function nextImage() {
    if (images.length === 0) return;
    currentIndex = (currentIndex + 1) % images.length;
    document.getElementById("carouselImage").src = images[currentIndex];
    updateImageCount();
}

function openFullImage() {
    if (images.length > 0) {
        window.open(images[currentIndex], "_blank");
    }
}

async function addToCart(redirect) {
    if (!listingData) return;

    await fetch(`http://localhost:8080/api/cart/add/${listingData.id}`, {
        method: "POST",
        credentials: "include"
    });

    updateCartBadgeBackend();

    if (redirect) {
        window.location.href = "/cart.html";
    }
}

function buyNow() {
    addToCart(true);
}

function messageSeller() {
    if (!listingData) return;
    const sellerId = listingData.user.id;
    const listingId = listingData.id;
    window.location.href = `/messages.html?seller=${sellerId}&listing=${listingId}`;
}

async function checkFavourite() {
    const res = await fetch("http://localhost:8080/api/favourites/me", { credentials: "include" });
    if (!res.ok) return;

    const body = await res.json();
    if (!body.success || !body.data) return;

    const favs = body.data;
    isFavourite = favs.some(f => f.id === listingData.id);

    updateFavouriteUI();
}

function updateFavouriteUI() {
    const star = document.getElementById("favStar");
    const btn = document.getElementById("favBtn");

    if (isFavourite) {
        star.style.color = "#ff7ebf";
        btn.textContent = "★ Remove from Favourites";
    } else {
        star.style.color = "#ccc";
        btn.textContent = "★ Add to Favourites";
    }
}

async function addToFavourites() {
    if (!listingData) return;

    const url = isFavourite
        ? `http://localhost:8080/api/favourites/remove/${listingData.id}`
        : `http://localhost:8080/api/favourites/add/${listingData.id}`;

    const method = isFavourite ? "DELETE" : "POST";

    const res = await fetch(url, {
        method,
        credentials: "include"
    });

    if (res.ok) {
        isFavourite = !isFavourite;
        updateFavouriteUI();
    }
}

loadNavbar();
loadListing();
</script>

</body>
</html>
