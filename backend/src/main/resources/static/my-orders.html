<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Orders</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 0;
            color: black;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            border: 3px solid #ff7ebf;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }
        h2 {
            margin-top: 0;
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
        }
        .order {
            display: flex;
            align-items: center;
            border: 2px solid black;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            background: #f7f7f7;
        }
        .order img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid black;
            margin-right: 20px;
        }
        .details {
            flex: 1;
        }
        .details h3 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
        }
        .details p {
            margin: 6px 0;
            font-size: 16px;
        }
        .status {
            font-weight: 700;
            margin-top: 6px;
        }
        .btn {
            padding: 10px 14px;
            border-radius: 8px;
            border: 2px solid black;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }
        .ship-btn {
            background: #ff7ebf;
        }
        .receive-btn {
            background: #ffe066;
        }
        .empty {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<div id="navbar"></div>

<script>
async function updateCartCount() {
    const el = document.getElementById("cartCount");
    if (!el) return;

    const res = await fetch("http://localhost:8080/api/cart", { credentials: "include" });
    if (!res.ok) {
        el.textContent = 0;
        return;
    }

    const cart = await res.json();
    el.textContent = cart.length;
}
</script>

<script>
fetch("/navbar.html")
    .then(res => res.text())
    .then(html => {
        document.getElementById("navbar").innerHTML = html;
        updateCartCount();
    });
</script>

<div class="container">
    <h2>My Orders</h2>
    <div id="orders"></div>
</div>

<script>
let currentUserId = null;

async function loadUser() {
    const res = await fetch("http://localhost:8080/api/session/me", { credentials: "include" });
    if (!res.ok) return;
    const data = await res.json();
    currentUserId = data.id;
}

async function loadOrders() {
    await loadUser();

    const res = await fetch("http://localhost:8080/api/orders/me", {
        credentials: "include"
    });

    const data = await res.json();
    const container = document.getElementById("orders");
    container.innerHTML = "";

    if (!data.success || data.data.length === 0) {
        container.innerHTML = "<div class='empty'>You haven't bought anything yet.</div>";
        return;
    }

    data.data.forEach(order => {
        const div = document.createElement("div");
        div.className = "order";

        let actionButton = "";

        if (order.status === "PAID" && order.sellerId === currentUserId) {
            actionButton = `<button class="btn ship-btn" onclick="markShipped(${order.id})">Mark as Shipped</button>`;
        }

        if (order.status === "SHIPPED" && order.buyerId === currentUserId) {
            actionButton = `<button class="btn receive-btn" onclick="markReceived(${order.id})">Mark as Received</button>`;
        }

        div.innerHTML = `
            <img src="${order.mainImageUrl}" alt="Listing">
            <div class="details">
                <h3 onclick="openListing(${order.listingId}, ${order.id})">${order.title}</h3>
                <p><strong>Price:</strong> £${order.priceAtPurchase}</p>
                <p><strong>Seller:</strong> ${order.sellerUsername}</p>
                <p><strong>Date:</strong> ${new Date(order.createdAt).toLocaleDateString()}</p>
                <p class="status"><strong>Status:</strong> ${order.status}</p>
                ${actionButton}
            </div>
        `;

        container.appendChild(div);
    });
}

function openListing(listingId, orderId) {
    window.location.href = `listing.html?id=${listingId}&fromOrders=true&orderId=${orderId}`;
}

async function markShipped(orderId) {
    await fetch(`http://localhost:8080/api/orders/${orderId}/ship`, {
        method: "POST",
        credentials: "include"
    });
    loadOrders();
}

async function markReceived(orderId) {
    await fetch(`http://localhost:8080/api/orders/${orderId}/receive`, {
        method: "POST",
        credentials: "include"
    });
    loadOrders();
}

loadOrders();
</script>

</body>
</html>
