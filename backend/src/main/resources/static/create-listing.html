<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Listing</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #d7f5d0;
            margin: 0;
            padding: 0;
            color: black;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 35px;
            border-radius: 12px;
            border: 3px solid #ff7ebf;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 2px solid black;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ff7ebf;
            border: 2px solid black;
            color: black;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 18px;
            font-weight: 600;
        }

        button:hover {
            background: #ff9ad0;
        }

        .message {
            margin-top: 15px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<div id="navbar"></div>
<script>
    fetch("/navbar.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("navbar").innerHTML = html;
        });
</script>

<div class="container">
    <h2>Create a New Listing</h2>

    <input id="title" type="text" placeholder="Title">
    <textarea id="description" placeholder="Description"></textarea>
    <input id="price" type="number" placeholder="Price (£)" step="0.01">

    <input id="brand" type="text" placeholder="Brand">
    <input id="size" type="text" placeholder="Size">

    <select id="condition">
        <option value="">Select Condition</option>
        <option value="NEW">New</option>
        <option value="USED">Used</option>
    </select>

    <select id="category">
        <option value="">Select Category</option>
        <option value="ELECTRONICS">Electronics</option>
        <option value="FASHION">Fashion</option>
        <option value="HOME">Home</option>
        <option value="SPORTS">Sports</option>
        <option value="OTHER">Other</option>
    </select>

    <h3 style="font-weight:600; margin-top:20px;">Upload Images</h3>
    <input id="images" type="file" multiple>

    <button id="create-btn">Create Listing</button>

    <div id="message" class="message"></div>
</div>

<script>
    const createBtn = document.getElementById("create-btn");
    const messageBox = document.getElementById("message");

    function showMessage(text, type="error") {
        messageBox.textContent = text;
        messageBox.className = "message " + type;
    }

    createBtn.onclick = async () => {
        const title = document.getElementById("title").value;
        const description = document.getElementById("description").value;
        const price = document.getElementById("price").value;
        const brand = document.getElementById("brand").value;
        const size = document.getElementById("size").value;
        const condition = document.getElementById("condition").value;
        const category = document.getElementById("category").value;
        const images = document.getElementById("images").files;

        if (!title || !description || !price || !brand || !size || !condition || !category || images.length === 0) {
            showMessage("Please fill in all fields.", "error");
            return;
        }

        const formData = new FormData();

        const jsonData = {
            title,
            description,
            price: Number(price),
            brand,
            size,
            itemCondition: condition,
            category
        };

        formData.append("data", JSON.stringify(jsonData));

        for (let i = 0; i < images.length; i++) {
            formData.append("images", images[i]);
        }

        const res = await fetch("http://localhost:8080/api/listings", {
            method: "POST",
            body: formData,
            credentials: "include"
        });

        const text = await res.text();

        if (!text.toLowerCase().includes("temporary")) {
            showMessage("Error creating listing.", "error");
            return;
        }

        showMessage("Listing created successfully!", "success");

        setTimeout(() => {
            window.location.href = "/browse.html";
        }, 1500);
    };
</script>

</body>
</html>
