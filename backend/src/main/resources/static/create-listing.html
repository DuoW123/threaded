<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Listing</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 0;
            color: black;
        }

        .container {
            max-width: 650px;
            margin: 50px auto;
            background: white;
            padding: 35px;
            border-radius: 12px;
            border: 3px solid #ff7ebf;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 2px solid black;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ff7ebf;
            border: 2px solid black;
            color: black;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 18px;
            font-weight: 600;
        }

        button:hover {
            background: #ff9ad0;
        }

        #dropZone {
            border: 3px dashed #ff7ebf;
            background: #ffe6f4;
            padding: 30px;
            text-align: center;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.2s;
        }

        #dropZone.dragover {
            background: #ffbfe5;
        }

        .image-preview {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .image-wrapper {
            position: relative;
            display: inline-block;
            border-radius: 8px;
            padding: 4px;
            background: white;
        }

        .image-wrapper img {
            height: 120px;
            width: 120px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid black;
            margin: 4px;
        }

        .trash-icon {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff4d4d;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid black;
        }

        .trash-icon:hover {
            background: #ff1a1a;
        }

        .message {
            margin-top: 15px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<div id="navbar"></div>

<script>
async function updateCartCount() {
    const el = document.getElementById("cartCount");
    if (!el) return;

    const res = await fetch("http://localhost:8080/api/cart", { credentials: "include" });
    if (!res.ok) {
        el.textContent = 0;
        return;
    }

    const cart = await res.json();
    el.textContent = cart.length;
}
</script>

<script>
    fetch("/navbar.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("navbar").innerHTML = html;
            updateCartCount();
        });
</script>

<div class="container">
    <h2>Create a New Listing</h2>

    <input id="title" type="text" placeholder="Title">
    <textarea id="description" placeholder="Description"></textarea>
    <input id="price" type="number" placeholder="Price (£)" step="0.01">

    <input id="brand" type="text" placeholder="Brand">
    <input id="size" type="text" placeholder="Size">

    <select id="condition">
        <option value="">Select Condition</option>
        <option value="NEW">New</option>
        <option value="USED">Used</option>
    </select>

    <select id="category">
        <option value="">Select Category</option>
        <option value="CLOTHING">Clothing</option>
        <option value="FOOTWEAR">Footwear</option>
        <option value="ACCESSORIES">Accessories</option>
        <option value="SPORTSWEAR">Sportswear</option>
        <option value="OTHER">Other</option>
    </select>

    <h3 style="font-weight:600; margin-top:20px;">Upload Images</h3>

    <div id="dropZone">Drag & Drop Images Here</div>

    <input id="images" type="file" multiple style="margin-top:10px;">
    <div id="imagePreview" class="image-preview"></div>

    <button id="create-btn">Create Listing</button>

    <div id="message" class="message"></div>
</div>

<script>
    const createBtn = document.getElementById("create-btn");
    const messageBox = document.getElementById("message");
    const imageInput = document.getElementById("images");
    const dropZone = document.getElementById("dropZone");
    let selectedFiles = [];

    function showMessage(text, type="error") {
        messageBox.textContent = text;
        messageBox.className = "message " + type;
    }

    dropZone.addEventListener("dragover", e => {
        e.preventDefault();
        dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
        dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", e => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        const dropped = Array.from(e.dataTransfer.files);
        selectedFiles = selectedFiles.concat(dropped);
        updateFileInput();
        renderPreviews();
    });

    imageInput.addEventListener("change", function () {
        const newFiles = Array.from(this.files);
        selectedFiles = selectedFiles.concat(newFiles);
        updateFileInput();
        renderPreviews();
    });

    function renderPreviews() {
        const preview = document.getElementById("imagePreview");
        preview.innerHTML = "";
        selectedFiles.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = e => {
                const wrapper = document.createElement("div");
                wrapper.className = "image-wrapper";
                const img = document.createElement("img");
                img.src = e.target.result;
                const trash = document.createElement("div");
                trash.className = "trash-icon";
                trash.innerHTML = "🗑️";
                trash.onclick = () => {
                    selectedFiles.splice(index, 1);
                    updateFileInput();
                    renderPreviews();
                };
                wrapper.appendChild(img);
                wrapper.appendChild(trash);
                preview.appendChild(wrapper);
            };
            reader.readAsDataURL(file);
        });
    }

    function updateFileInput() {
        const dataTransfer = new DataTransfer();
        selectedFiles.forEach(f => dataTransfer.items.add(f));
        imageInput.files = dataTransfer.files;
    }

    createBtn.onclick = async () => {
        const title = document.getElementById("title").value;
        const description = document.getElementById("description").value;
        const price = document.getElementById("price").value;
        const brand = document.getElementById("brand").value;
        const size = document.getElementById("size").value;
        const condition = document.getElementById("condition").value;
        const category = document.getElementById("category").value;

        if (!title || !description || !price || !brand || !size || !condition || !category || selectedFiles.length === 0) {
            showMessage("Please fill in all fields.", "error");
            return;
        }

        const formData = new FormData();

        const jsonData = {
            title,
            description,
            price: Number(price),
            brand,
            size,
            itemCondition: condition,
            category
        };

        formData.append("data", JSON.stringify(jsonData));
        selectedFiles.forEach(file => formData.append("images", file));

        const res = await fetch("http://localhost:8080/api/listings", {
            method: "POST",
            body: formData,
            credentials: "include"
        });

        const text = await res.text();

        if (!text.toLowerCase().includes("temporary")) {
            showMessage("Error creating listing.", "error");
            return;
        }

        showMessage("Listing created successfully!", "success");

        setTimeout(() => {
            window.location.href = "/browse.html";
        }, 1500);
    };
</script>

</body>
</html>
