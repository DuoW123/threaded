            <svg class="basket-icon" viewBox="0 0 24 24">
                <path d="M3 7h18l-2 12H5L3 7z" fill="none" stroke="black" stroke-width="2"/>
                <path d="M9 7l-3-4" stroke="black" stroke-width="2"/>
                <path d="M15 7l3-4" stroke="black" stroke-width="2"/>
                <line x1="7" y1="11" x2="7" y2="15" stroke="black" stroke-width="2"/>
                <line x1="12" y1="11" x2="12" y2="15" stroke="black" stroke-width="2"/>
                <line x1="17" y1="11" x2="17" y2="15" stroke="black" stroke-width="2"/>
            </svg>

            <div id="cartCount" class="cart-count">0</div>

<style>
    .navbar {
        background: #ff7ebf;
        padding: 18px 30px;
        color: black;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
        border-bottom: 4px solid black;
    }

    .navbar h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 1px;
    }

    .nav-links {
        display: flex;
        align-items: center;
    }

    .nav-links a {
        color: black;
        text-decoration: none;
        margin-left: 20px;
        font-size: 18px;
        font-weight: bold;
    }

    .nav-links a:hover {
        text-decoration: underline;
    }

    .cart-wrapper {
        position: relative;
        margin-left: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
    }

    .basket-icon {
        width: 30px;
        height: 30px;
    }

    .cart-count {
        position: absolute;
        top: -10px;
        right: -12px;
        background: #ff7ebf;
        color: white;
        font-size: 14px;
        font-weight: 700;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid black;
        display: flex;
        align-items: center;
        justify-content: center;
    }
</style>

<script>
async function updateCartCount() {
    const el = document.getElementById("cartCount");
    if (!el) return;

    const res = await fetch("/api/cart", {
        credentials: "include"
    });

    if (!res.ok) {
        el.textContent = 0;
        return;
    }

    const cart = await res.json();
    el.textContent = cart.length;
}

updateCartCount();
</script>
