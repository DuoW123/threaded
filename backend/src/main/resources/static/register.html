<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: black;
        }

        .title {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .register-box {
            background: white;
            padding: 35px;
            width: 360px;
            border-radius: 12px;
            border: 3px solid #ff7ebf;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
            text-align: center;
        }

        .register-box h2 {
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 2px solid black;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 8px;
            border: none;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        #register-btn {
            background: #ff7ebf;
            color: black;
            border: 2px solid black;
        }

        #register-btn:hover {
            background: #ff9ad0;
        }

        #login-btn {
            background: black;
            color: white;
            border: 2px solid black;
        }

        #login-btn:hover {
            background: #333;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .success {
            color: green;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="title">THREADED</div>

<div class="register-box">
    <h2>Create Account</h2>

    <input id="email" type="email" placeholder="Email">
    <input id="username" type="text" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button id="register-btn">Register</button>
    <button id="login-btn" onclick="window.location.href='login.html'">Back to Login</button>

    <div id="message"></div>
</div>

<script>
    const msg = document.getElementById("message");

    function show(text, type = "error") {
        msg.textContent = text;
        msg.className = type;
    }

    document.getElementById("register-btn").onclick = async () => {
        const email = document.getElementById("email").value.trim();
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!email || !username || !password) {
            show("All fields are required.", "error");
            return;
        }

        try {
            const res = await fetch("http://localhost:8080/api/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, username, password })
            });

            const data = await res.json();

            if (!data.success) {
                show(data.message, "error");
                return;
            }

            show(data.message, "success");

            setTimeout(() => {
                window.location.href = "login.html";
            }, 2000);

        } catch (err) {
            show("Could not connect to server.", "error");
        }
    };
</script>

</body>
</html>
