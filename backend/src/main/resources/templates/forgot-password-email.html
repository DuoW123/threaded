<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset Request</title>
</head>
<body>
    <h1 style ="font-size: 24px; color: #74EB34">Password Reset Request</h1>
    <p style ="font-size: 16px">Hello <strong>[[USERNAME]]</strong>,</p>
    <p></p>
    <p style ="font-size: 16px">We received a request to reset your password.</p>
    <p></p>
    <div>
        <a href="http://localhost:8080/reset-password.html?token=[[TOKEN]]"
           style="background: #74EB34; color: white; padding: 12px 25px; font-weight: bold; border-radius: 5px; display: inline-block">
            Reset Password
        </a>
    </div>
    <p style="font-size: 16px">
        If the button above doesn't work, use the link below.
        <a href="http://localhost:8080/reset-password.html?token=[[TOKEN]]">
            http://localhost:8080/reset-password?token=[[TOKEN]]
        </a>
    </p>
    <p></p>
    <p style ="font-size: 16px">This link expires in 24 hours.</p>
    </body>
</html>
